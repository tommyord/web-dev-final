<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To-do List | Tommy Ord</title>
    <link rel="stylesheet" href="todo.css">
</head>
<body>

    <header>
        <h1>My To-do List</h1>
        <p class="subtitle">Built with AI assistance</p>
    </header>

    <main>
        <div class="todo-container">

            <!-- Input area -->
            <div class="input-row">
                <input type="text" id="taskInput" placeholder="What do you need to do?" maxlength="100">
                <button id="addBtn">Add</button>
            </div>

            <!-- The list of tasks appears here -->
            <ul id="taskList"></ul>

            <p id="emptyMessage">No tasks yet. Add one above!</p>
        </div>

        <p class="back">
            <a href="index.html">&larr; Back to home</a>
        </p>
    </main>

    <script>
        // Grab references to elements on the page
        const taskInput = document.getElementById('taskInput');
        const addBtn = document.getElementById('addBtn');
        const taskList = document.getElementById('taskList');
        const emptyMessage = document.getElementById('emptyMessage');

        // Function that adds a task
        function addTask() {
            const text = taskInput.value.trim();
            if (text === '') return; // Don't add empty tasks

            // Create the list item
            const li = document.createElement('li');

            // Create the checkbox
            const checkbox = document.createElement('input');
            checkbox.type = 'checkbox';
            checkbox.addEventListener('change', () => {
                li.classList.toggle('completed');
            });

            // Create the text span
            const span = document.createElement('span');
            span.textContent = text;

            // Create the delete button
            const deleteBtn = document.createElement('button');
            deleteBtn.textContent = '×';
            deleteBtn.className = 'delete';
            deleteBtn.addEventListener('click', () => {
                li.remove();
                updateEmptyMessage();
            });

            // Put it all together
            li.appendChild(checkbox);
            li.appendChild(span);
            li.appendChild(deleteBtn);
            taskList.appendChild(li);

            // Clear the input and update the empty message
            taskInput.value = '';
            updateEmptyMessage();
        }

        // Show/hide the "no tasks" message
        function updateEmptyMessage() {
            if (taskList.children.length === 0) {
                emptyMessage.style.display = 'block';
            } else {
                emptyMessage.style.display = 'none';
            }
        }

        // Wire up the button and Enter key
        addBtn.addEventListener('click', addTask);
        taskInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') addTask();
        });
    </script>

</body>
</html>
